<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PONG - 8086 DOS Game</title>
    <link rel="stylesheet" href="https://js-dos.com/6.22/current/js-dos.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0a0a;
            color: #e0e0e0;
            font-family: "Courier New", monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        header {
            text-align: center;
            padding: 1.5rem 1rem 0.5rem;
            width: 100%;
        }

        header h1 {
            font-size: 2rem;
            color: #fff;
            letter-spacing: 0.3em;
            text-shadow: 0 0 10px rgba(255,255,255,0.3);
        }

        header p {
            margin-top: 0.5rem;
            font-size: 0.85rem;
            color: #888;
            line-height: 1.6;
        }

        header p kbd {
            background: #222;
            border: 1px solid #444;
            border-radius: 3px;
            padding: 1px 5px;
            font-size: 0.8rem;
            color: #ccc;
        }

        #jsdos-container {
            margin-top: 1rem;
            width: 640px;
            max-width: 100%;
        }

        #jsdos {
            width: 100%;
            aspect-ratio: 4 / 3;
        }

        #loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 480px;
            color: #666;
            font-size: 0.9rem;
        }

        #loading .spinner {
            width: 24px;
            height: 24px;
            border: 2px solid #333;
            border-top-color: #888;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        footer {
            margin-top: 1.5rem;
            padding: 1rem;
            text-align: center;
            font-size: 0.75rem;
            color: #555;
        }

        footer a {
            color: #777;
            text-decoration: none;
        }

        footer a:hover {
            color: #aaa;
        }

        @media (max-width: 660px) {
            #jsdos-container { width: 100%; padding: 0 0.5rem; }
            header h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <header>
        <h1>P O N G</h1>
        <p>
            <kbd>Jugador 1</kbd> <kbd>W</kbd> / <kbd>S</kbd> &nbsp;&middot;&nbsp;
            <kbd>Jugador 2</kbd> <kbd>&uarr;</kbd> / <kbd>&darr;</kbd> &nbsp;&middot;&nbsp;
            <kbd>Enter</kbd> empezar &nbsp;&middot;&nbsp;
            <kbd>Esc</kbd> salir
        </p>
    </header>

    <div id="jsdos-container">
        <div id="loading">
            <div class="spinner"></div>
            Cargando DOSBox WebAssembly...
        </div>
        <div id="jsdos" style="display:none;"></div>
    </div>

    <footer>
        PONG &mdash; Juego original en ensamblador 8086 &mdash;
        Emulado con <a href="https://js-dos.com" target="_blank" rel="noopener">js-dos</a> (DOSBox WASM)
    </footer>

    <script src="https://js-dos.com/6.22/current/js-dos.js"></script>
    <script>
        (function () {
            var loading = document.getElementById("loading");
            var jsdos   = document.getElementById("jsdos");

            Dos(jsdos, {
                wdosboxUrl: "https://js-dos.com/6.22/current/wdosbox.js",
                // Scale to fit container
                scaler: 2,
                // Sensible defaults for a simple DOS game
                cycles: 600,
            }).ready(function (fs, main) {
                fs.extract("pong.zip").then(function () {
                    loading.style.display = "none";
                    jsdos.style.display   = "block";
                    main(["-c", "PONG.EXE"]);
                }).catch(function (err) {
                    loading.textContent = "Error al cargar el juego: " + err;
                });
            });
        })();
    </script>
</body>
</html>
